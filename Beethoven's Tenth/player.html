.player-box {
  background: #ffffff;

  font-size: 24px;
  margin-bottom: 20px;
}

```

  </style>
</head>
<body>

  <div class="player-box">
    <h1 id="music-title">音乐播放器</h1>

```
<audio id="audio-player" controls preload="metadata">
  你的浏览器不支持音频播放。
</audio>

<p class="note">
  如果播放器无法加载，请点击：
  <a id="direct-link" href="#" target="_blank" rel="noopener">直接打开音频文件</a>
</p>
```

  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const title = params.get("title") || "未命名音乐";
    const src = params.get("src");

    const titleElement = document.getElementById("music-title");
    const audioElement = document.getElementById("audio-player");
    const directLink = document.getElementById("direct-link");

    titleElement.textContent = title;

    if (src) {
      const audioUrl = new URL(src, window.location.href).href;
      audioElement.src = audioUrl;
      directLink.href = audioUrl;
    } else {
      titleElement.textContent = "未提供音乐链接";
      directLink.textContent = "没有可打开的音频文件";
    }
  </script>

</body>
</html>
